# fly.toml app configuration file generated for kip on 2025-03-25T23:37:16+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
app = 'ieeecvss'
primary_region = 'ams'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = '8.2'

[env]
  APP_ENV = 'production'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  SESSION_DRIVER = 'cookie'
  SESSION_SECURE_COOKIE = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'  # Consider reducing this further
  cpu_kind = 'shared'
  cpus = 1